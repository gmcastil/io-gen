title: Digilent Basys3 Reference Design
part: xc7a35tcpg236-1
architecture: rtl

signals:

  - name: clk_100m00
    pins: W5
    iostandard: LVCMOS33
    direction: in
    buffer: ibuf
    infer: true

  - name: slider_sw
    pins: [V17, V16, W16, W17, W15, V15, W14, W13, V2, T3, T2, R3, W2, U1, T1, R2]
    iostandard: LVCMOS33
    direction: in
    width: 16
    buffer: ibuf
    infer: true

  - name: led
    pins: [U16, E19, U19, V19, W18, U15, U14, V14, V13, V3, W3, U3, P3, N3, P1, L1]
    iostandard: LVCMOS33
    width: 16
    direction: out
    buffer: obuf
    infer: true

  # Seven-segment display
  #   0 - A (top)
  #   1 - B (upper right)
  #   2 - C (lower right)
  #   3 - D (bottom)
  #   4 - E (lower left)
  #   5 - F (upper left)
  #   6 - G (middle)
  - name: seg
    pins: [W7, W6, U8, V8, U5, V5, U7]
    iostandard: LVCMOS33
    direction: out
    width: 7
    buffer: obuf
    infer: true

  # Active low
  - name: digit_en
    pins: [U2, U4, V4, W4]
    iostandard: LVCMOS33
    direction: out
    width: 4
    buffer: obuf
    infer: true

  # Seven-segment display decimal point
  - name: dp
    pins: V7
    iostandard: LVCMOS33
    direction: out
    buffer: obuf
    infer: true

  # Push-button switches
  #   0 - Center
  #   1 - Upper
  #   2 - Left
  #   3 - Right
  #   4 - Down
  - name: btn
    pins: [U18, T18, W19, T17, U17]
    iostandard: LVCMOS33
    direction: in
    width: 5
    buffer: ibuf
    infer: true

  # PMOD header JA (schematic numbers differ from PMOD pin numbers)
  #   0 - JA1
  #   1 - JA2
  #   2 - JA3
  #   3 - JA4
  #   4 - JA7
  #   5 - JA8
  #   6 - JA9
  #   7 - JA10
  - name: pmod_ja
    pins: [J1, L2, J2, G2, H1, K2, H2, G3]
    iostandard: LVCMOS33
    width: 8
    generate: false

  # PMOD header JB (schematic numbers differ from PMOD pin numbers)
  #   0 - JB1
  #   1 - JB2
  #   2 - JB3
  #   3 - JB4
  #   4 - JB7
  #   5 - JB8
  #   6 - JB9
  #   7 - JB10
  - name: pmod_jb
    pins: [A14, A16, B15, B16, A15, A17, C15, C16]
    iostandard: LVCMOS33
    width: 8
    generate: false

  # PMOD header JC (schematic numbers differ from PMOD pin numbers)
  #   0 - JC1
  #   1 - JC2
  #   2 - JC3
  #   3 - JC4
  #   4 - JC7
  #   5 - JC8
  #   6 - JC9
  #   7 - JC10
  - name: pmod_jc
    pins: [K17, M18, N17, P18, L17, M19, P17, R18]
    iostandard: LVCMOS33
    width: 8
    generate: false

  # PMOD header JXADC
  #   p: XA1_P XA2_P XA3_P XA4_P
  #   n: XA1_N XA2_N XA3_N XA4_N
  #
  # These pins can be used in two different ways. Either as analog inputs to the
  # XADC
  - name: pmod_jxadc
    pinset:
      p: [J3, L3, M2, N2]
      n: [K3, M3, M1, N1]
    iostandard: LVCMOS33
    direction: in
    width: 4
    buffer: ibufds
    generate: true

  # VGA connector
  - name: vga_red
    pins: [G19, H19, J19, N19]
    iostandard: LVCMOS33
    direction: out
    width: 4
    buffer: obuf
    infer: true
  - name: vga_blue
    pins: [N18, L18, K18, J18]
    iostandard: LVCMOS33
    direction: out
    width: 4
    buffer: obuf
    infer: true
  - name: vga_green
    pins: [J17, H17, G17, D17]
    iostandard: LVCMOS33
    direction: out
    width: 4
    buffer: obuf
    infer: true
  - name: vga_hsync
    pins: P19
    iostandard: LVCMOS33
    direction: out
    buffer: obuf
    infer: true
  - name: vga_vsync
    pins: R19
    iostandard: LVCMOS33
    direction: out
    buffer: obuf
    infer: true

  # FTDI FT2232 USB-UART bridge
  - name: uart_rx
    pins: B18
    iostandard: LVCMOS33
    direction: in
    buffer: ibuf
    comment:
      hdl: Schematic refers to this pin as TXD
  - name: uart_tx
    pins: A18
    iostandard: LVCMOS33
    direction: out
    buffer: obuf
    comment:
      hdl: Schematic refers to this pin as RXD

  # Auxiliary function microcontroller (Microchip PIC24FJ128)
  #
  # This is a bi-directional, open-collector bus and requires the use of the internal
  # pullup resistors on the Artix-7.  So additional constraints should be added:
  #
  # set_property PULLUP true [get_ports ps2_clk]
  # set_property PULLUP true [get_ports ps2_data]
  - name: ps2_clk
    pins: C17
    iostandard: LVCMOS33
    direction: inout
    buffer: iobuf
  - name: ps2_data
    pins: B17
    iostandard: LVCMOS33
    direction: inout
    buffer: iobuf

  # 32Mb quad-mode SPI flash
  #
  # Note that the SPI clock (package pin C11) cannot be placed in 7 series devices
  # and must be accessed using the STARTUPE2 primitive. This interface is not
  # typically generated by default, but is included here to improve the validation.
  - name: spi_cs_n
    pins: K19
    iostandard: LVCMOS33
    direction: out
    buffer: obuf
    generate: true
  - name: spi_sdi
    pins: D18
    iostandard: LVCMOS33
    direction: inout
    buffer: iobuf
    generate: true
  - name: spi_sdo
    pins: D19
    iostandard: LVCMOS33
    direction: inout
    buffer: iobuf
    generate: true
  - name: spi_wp_n
    pins: G18
    iostandard: LVCMOS33
    direction: inout
    buffer: iobuf
    generate: true
  - name: spi_hld_n
    pins: F18
    iostandard: LVCMOS33
    direction: inout
    buffer: iobuf
    generate: true
