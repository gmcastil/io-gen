title: Example Design
part: xc7k325tffg900-2

banks:
    34:
        iostandard: LVCMOS18
        performance: HR
        comment: 1.8V single-ended bank
    115:
        iostandard: LVDS
        performance: HP
        comment: Differential HP bank

signals:

    # Scalar single-ended input
    - name: sys_clk
      pins: G22
      bank: 34
      direction: in
      buffer: ibuf
      group: clock
      comment:
          xdc: 125 MHz system clock
          hdl: 125 MHz system clock input

    # Bus single-ended output
    - name: led
      pins: [A22, B22, C22, D22]
      width: 4
      iostandard: LVCMOS18
      direction: out
      buffer: obuf
      group: led
      comment:
          xdc: User LEDs
          hdl: User LED outputs

    # Scalar differential input
    - name: ref_clk
      pinset:
          p: H22
          n: H23
      bank: 115
      direction: in
      buffer: ibufds
      group: clock
      comment:
          xdc: 200 MHz reference clock
          hdl: 200 MHz differential reference clock input

    # Bus differential output
    - name: lvds_data
      pinset:
          p: [AA1, AB1, AC1]
          n: [AA2, AB2, AC2]
      width: 3
      iostandard: LVDS
      direction: out
      buffer: obufds
      comment:
          xdc: LVDS data outputs
          hdl: LVDS serial data outputs

    # Bus inout single-ended
    - name: gpio
      pins: [E22, F22, G23, A23, B23]
      width: 5
      iostandard: LVCMOS18
      direction: inout
      buffer: iobuf
      comment:
          xdc: GPIO bus
          hdl: General purpose IO

    # Reserved pin - no HDL output
    - name: reserved_nc
      pins: H24
      generate: false
