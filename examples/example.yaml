title: Example Design
part: xc7k325tffg900-2
architecture: rtl

constraints:
  cfgbvs: GND
  config_voltage: 1.8

signals:

    # Scalar single-ended input
    - name: sys_clk
      pins: G22
      iostandard: LVCMOS18
      direction: in
      buffer: ibuf
      comment:
          xdc: 125 MHz system clock
          hdl: 125 MHz system clock input

    # Bus single-ended output
    - name: led
      pins: [A22, B22, C22, D22]
      width: 4
      iostandard: LVCMOS18
      direction: out
      buffer: obuf
      comment:
          xdc: User LEDs
          hdl: User LED outputs

    # Scalar single-ended output - buffer inferred by synthesis
    - name: user_led
      pins: K22
      iostandard: LVCMOS18
      direction: out
      buffer: obuf
      infer: true
      comment:
          xdc: User LED (inferred buffer)
          hdl: User LED output, buffer inferred

    # Scalar differential input
    - name: ref_clk
      pinset:
          p: H22
          n: H23
      iostandard: LVDS
      direction: in
      buffer: ibufds
      comment:
          xdc: 200 MHz reference clock
          hdl: 200 MHz differential reference clock input

    # Bus differential output
    - name: lvds_data
      pinset:
          p: [AA1, AB1, AC1]
          n: [AA2, AB2, AC2]
      width: 3
      iostandard: LVDS
      direction: out
      buffer: obufds
      comment:
          xdc: LVDS data outputs
          hdl: LVDS serial data outputs

    # Bus inout single-ended
    - name: gpio
      pins: [E22, F22, G23, A23, B23]
      width: 5
      iostandard: LVCMOS18
      direction: inout
      buffer: iobuf
      generate: true
      comment:
          xdc: GPIO bus
          hdl: General purpose IO

    # Spare output - bypasses IO ring, driven directly by user logic
    - name: spare
      pins: J24
      iostandard: LVCMOS18
      direction: out
      bypass: true
      comment:
          xdc: Spare output pin
          hdl: Spare output, driven directly

    # Reserved pin - no HDL output
    - name: reserved_nc
      pins: H24
      generate: false

    # Scalar differential IO buffer
    - name: diff_io
      pinset:
        p: J25
        n: K25
      iostandard: DIFF_HSTL_I
      direction: inout
      buffer: iobufds
      comment:
        xdc: Differential IO buffer
        hdl: Differential general IO

